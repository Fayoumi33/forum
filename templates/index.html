<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Forum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            animation: float 20s ease-in-out infinite;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: linear-gradient(45deg, #8b5cf6, #764ba2);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(45deg, #3b82f6, #06b6d4);
            bottom: -10%;
            right: -10%;
            animation-delay: 7s;
        }

        .blob-3 {
            width: 350px;
            height: 350px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            top: 40%;
            right: 20%;
            animation-delay: 14s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .login-container {
            display: flex;
            max-width: 1100px;
            width: 100%;
            gap: 80px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .left-section {
            flex: 1;
            animation: slideInLeft 0.8s ease-out;
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .logo {
            font-size: 72px;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -2px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 24px;
            line-height: 1.6;
            font-weight: 400;
        }

        .right-section {
            flex: 1;
            max-width: 450px;
            animation: slideInRight 0.8s ease-out;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .login-card {
            background: rgba(30, 36, 51, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-primary);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .input-group input::placeholder {
            color: var(--text-muted);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-purple);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .login-btn {
            padding: 18px;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(-1px);
        }

        .divider {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-primary), transparent);
            margin: 25px 0;
        }

        .create-account-btn {
            display: block;
            padding: 16px 28px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            margin: 0 auto;
            width: fit-content;
        }

        .create-account-btn:hover {
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
        }

        .create-page-text {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .create-page-text a {
            color: var(--accent-purple);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .create-page-text a:hover {
            color: var(--accent-pink);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            text-align: center;
        }

        @media (max-width: 991px) {
            .login-container { gap: 60px; }
            .logo { font-size: 60px; }
            .tagline { font-size: 22px; }
        }

        @media (max-width: 767px) {
            body { padding: 15px; }
            .login-container {
                flex-direction: column;
                gap: 40px;
                text-align: center;
            }
            .logo { font-size: 52px; }
            .tagline { font-size: 20px; }
            .right-section { max-width: 100%; width: 100%; }
            .login-card { padding: 30px 25px; }
        }

        @media (max-width: 479px) {
            .logo { font-size: 44px; }
            .tagline { font-size: 18px; line-height: 1.5; }
            .login-card { padding: 25px 20px; }
            .input-group input { padding: 14px 16px; font-size: 15px; }
            .login-btn { font-size: 16px; padding: 16px; }
            .create-account-btn { font-size: 15px; padding: 14px 24px; }
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="login-container">
        <div class="left-section">
            <h1 class="logo">forum</h1>
            <p class="tagline">Connect with friends and the world around you on Forum.</p>
        </div>

        <div class="right-section">
            <div class="login-card">
                <form action="/login" method="POST" class="login-form">
                    {{if .Error}}
                    <div class="error-msg">{{.Error}}</div>
                    {{end}}
                    <div class="input-group">
                        <input type="email" name="email" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <input type="password" name="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="login-btn">Log In</button>
                </form>

                <hr class="divider">

                <a href="/register" class="create-account-btn">Create new account</a>
            </div>
        </div>
    </div>
</body>
</html>
