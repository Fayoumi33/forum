<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - Forum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/style.css">
    <style>
        /* Additional styles for create post page */
        .create-post-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .create-post-card {
            background: rgba(30, 36, 51, 0.6);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .create-post-card h1 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 36px;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .create-post-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-group label {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.3px;
        }

        .form-group input[type="text"],
        .form-group textarea {
            padding: 16px 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input[type="text"]::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: rgba(139, 92, 246, 0.5);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .form-group textarea {
            min-height: 180px;
            resize: vertical;
        }

        /* Categories Section */
        .categories-section {
            background: rgba(15, 20, 25, 0.4);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .categories-section > label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 18px;
            letter-spacing: 0.3px;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .category-item {
            position: relative;
        }

        .category-item input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .category-label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
        }

        .category-label:hover {
            border-color: rgba(139, 92, 246, 0.5);
            background: rgba(139, 92, 246, 0.1);
            transform: translateY(-2px);
        }

        .category-item input[type="checkbox"]:checked + .category-label {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .category-label .checkmark {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .category-item input[type="checkbox"]:checked + .category-label .checkmark {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .category-label .checkmark::after {
            content: '';
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg) scale(0);
            transition: transform 0.2s ease;
        }

        .category-item input[type="checkbox"]:checked + .category-label .checkmark::after {
            transform: rotate(45deg) scale(1);
        }

        /* Submit Button */
        .submit-btn {
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        /* Back Link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 10px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
        }

        .back-link:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-4px);
        }

        .back-link::before {
            content: '←';
            font-size: 18px;
        }

        /* Responsive */
        @media (max-width: 767px) {
            .create-post-card {
                padding: 28px 24px;
            }

            .create-post-card h1 {
                font-size: 26px;
            }

            .categories-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 479px) {
            .create-post-card {
                padding: 24px 20px;
            }

            .create-post-card h1 {
                font-size: 24px;
            }

            .categories-section {
                padding: 18px;
            }

            .categories-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="/profile" class="nav-link">Profile</a>
        </div>
        <div class="nav-center">
            <a href="/home" class="nav-link">Home</a>
            <a href="/create-post" class="nav-link">Create Post</a>
        </div>
        <div class="nav-right">
            <a href="/logout" class="nav-link logout-btn">Logout</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="create-post-container">
        <a href="/home" class="back-link">Back to Home</a>
        
        <div class="create-post-card">
            <h1>Create New Post</h1>
            
            <form action="/create-post" method="post" class="create-post-form">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" placeholder="Enter your post title..." required>
                </div>
                
                <div class="form-group">
                    <label for="content">Content</label>
                    <textarea id="content" name="content" placeholder="Write your post content here..." required></textarea>
                </div>
                
                <div class="categories-section">
                    <label>Select Categories (at least one)</label>
                    <div class="categories-grid">
                        <div class="category-item">
                            <input type="checkbox" id="tech" name="categories" value="Technology">
                            <label for="tech" class="category-label">
                                <span class="checkmark"></span>
                                Technology
                            </label>
                        </div>
                        
                        <div class="category-item">
                            <input type="checkbox" id="sport" name="categories" value="Sport">
                            <label for="sport" class="category-label">
                                <span class="checkmark"></span>
                                Sport
                            </label>
                        </div>
                        
                        <div class="category-item">
                            <input type="checkbox" id="gaming" name="categories" value="Gaming">
                            <label for="gaming" class="category-label">
                                <span class="checkmark"></span>
                                Gaming
                            </label>
                        </div>
                        
                        <div class="category-item">
                            <input type="checkbox" id="news" name="categories" value="News">
                            <label for="news" class="category-label">
                                <span class="checkmark"></span>
                                News
                            </label>
                        </div>
                        
                        <div class="category-item">
                            <input type="checkbox" id="programming" name="categories" value="Programming">
                            <label for="programming" class="category-label">
                                <span class="checkmark"></span>
                                Programming
                            </label>
                        </div>
                        
                        <div class="category-item">
                            <input type="checkbox" id="quran" name="categories" value="Quran">
                            <label for="quran" class="category-label">
                                <span class="checkmark"></span>
                                Quran
                            </label>
                        </div>
                        
                        <div class="category-item">
                            <input type="checkbox" id="other" name="categories" value="Other">
                            <label for="other" class="category-label">
                                <span class="checkmark"></span>
                                Other
                            </label>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn">Create Post</button>
            </form>
        </div>
    </div>
</body>
</html>
